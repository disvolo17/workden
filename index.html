<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Денис Волошин — Project Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>

/* ===== БАЗА ===== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    overflow-x: hidden;
}

img, svg {
    max-width: 100%;
    height: auto;
}

/* ===== CONTACTS FIX ===== */

.contacts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* планшет */
@media (max-width: 900px) {
    .contacts-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* телефон */
@media (max-width: 600px) {
    .contacts-grid {
        grid-template-columns: 1fr;
    }
}

.contact-item {
    min-width: 0;
}

.contact-text {
    overflow: hidden;
}

.contact-text strong {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.contact-text,
.contact-text a {
    word-break: break-word;
    overflow-wrap: break-word;
}

/* ===== ТВОЙ ДИЗАЙН ===== */

:root {
    --primary: #0a1628;
    --secondary: #111d32;
    --accent: #ff6b4a;
    --text-primary: #ffffff;
    --text-secondary: #8a9bb8;
    --border: #1e3a5f;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--primary);
    color: var(--text-primary);
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 380px) minmax(0, 1fr);
}

/* SIDEBAR */

.sidebar {
    background: var(--secondary);
    padding: 60px 40px;
}

.name {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin-bottom: 10px;
}

.title {
    color: var(--accent);
    margin-bottom: 40px;
}

/* MAIN */

.main-content {
    padding: 60px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* CONTACTS */

.contacts-section {
    background: var(--secondary);
    padding: 40px;
    border-radius: 20px;
    margin-top: 40px;
}

.contact-item {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
}

.contact-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}

</style>
</head>

<body>

<div class="container">

<aside class="sidebar">
    <h1 class="name">Денис Волошин</h1>
    <div class="title">Project Manager</div>
</aside>

<main class="main-content">

<div class="stats-grid">
    <div>15+ туров</div>
    <div>36+ городов</div>
    <div>200+ концертов</div>
</div>

<div class="contacts-section">
    <h2>Контакты</h2>

    <div class="contacts-grid">

        <a href="tel:+79999753423" class="contact-item">
            📱 Телефон
        </a>

        <a href="mailto:disvolo@bk.ru" class="contact-item">
            ✉️ Email
        </a>

        <a href="https://vk.com/disvolo" class="contact-item">
            VK
        </a>

        <a href="https://t.me/disvolo" class="contact-item">
            Telegram
        </a>

        <a href="https://instagram.com/disvolo" class="contact-item">
            Instagram
        </a>

        <a href="#" class="contact-item">
            Max
        </a>

    </div>
</div>

</main>
</div>

</body>
</html>
